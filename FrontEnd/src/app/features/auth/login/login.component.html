<div class="page-center" dir="rtl">

  <!-- Animated background -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Card -->
  <div class="card animate-slide-up" style="width:100%; max-width:420px; position:relative; z-index:1;">

    <!-- Brand -->
    <div class="brand-logo mb-8">
      <div class="brand-icon">
        <i class="pi pi-chart-line"></i>
      </div>
      <span class="brand-name">ERP System</span>
    </div>

    <!-- Heading -->
    <div class="text-center mb-8">
      <h2>أهلاً بك مجدداً</h2>
      <p class="text-muted mt-2">يرجى تسجيل الدخول للوصول إلى النظام</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="flex flex-col gap-4">

      <!-- Username -->
      <div class="form-field">
        <label class="form-label" for="username">
          <i class="pi pi-user"></i>
          اسم المستخدم
        </label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          required
          placeholder="أدخل اسم المستخدم"
        />
      </div>

      <!-- Password -->
      <div class="form-field">
        <label class="form-label" for="password">
          <i class="pi pi-lock"></i>
          كلمة المرور
        </label>
        <div class="input-wrap">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="أدخل كلمة المرور"
          />
          <button type="button" class="input-action" (click)="showPassword = !showPassword" tabindex="-1">
            <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div class="alert alert--danger animate-fade-in" *ngIf="error">
        <i class="pi pi-exclamation-circle"></i>
        {{ error }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn btn--primary btn--full btn--lg"
        [class.is-loading]="isLoading"
        [disabled]="!loginForm.form.valid || isLoading"
        style="margin-top: 0.5rem;"
      >
        <i [class]="isLoading ? 'pi pi-spin pi-spinner' : 'pi pi-sign-in'"></i>
        {{ isLoading ? 'جارٍ التحقق...' : 'تسجيل الدخول' }}
      </button>

    </form>

    <p class="text-center font-sm mt-6" style="color: rgba(147,148,165,0.5);">
      نظام إدارة الموارد المؤسسية &copy; {{ currentYear }}
    </p>

  </div>
</div>
